<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Editor iframe Demo</title>
    <script src="./libs/sheetjs/xlsx.full.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: #1f2937;
        background: #f3f4f6;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 320px 1fr;
      }

      .panel {
        background: #ffffff;
        border-right: 1px solid #d1d5db;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .title {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 4px;
      }

      .hint {
        margin: 0 0 10px;
        color: #6b7280;
        font-size: 13px;
        line-height: 1.6;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 13px;
        color: #374151;
      }

      input[type='text'],
      input[type='file'] {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 9px 10px;
        font-size: 14px;
        background: #fff;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button {
        border: 1px solid #2563eb;
        background: #2563eb;
        color: #fff;
        border-radius: 6px;
        padding: 9px 12px;
        font-size: 14px;
        cursor: pointer;
      }

      button.secondary {
        border-color: #cbd5e1;
        background: #fff;
        color: #1f2937;
      }

      button:disabled {
        cursor: not-allowed;
        border-color: #cbd5e1;
        background: #e5e7eb;
        color: #9ca3af;
      }

      .viewer {
        min-width: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .bar {
        height: 44px;
        border-bottom: 1px solid #d1d5db;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        font-size: 13px;
        color: #4b5563;
      }

      iframe {
        width: 100%;
        flex: 1;
        border: 0;
        background: #fff;
      }

      pre {
        min-height: 150px;
        max-height: 260px;
        overflow: auto;
        margin: 0;
        padding: 10px;
        border-radius: 6px;
        background: #111827;
        color: #d1fae5;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      @media (max-width: 860px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .panel {
          border-right: 0;
          border-bottom: 1px solid #d1d5db;
        }

        .viewer {
          min-height: 70vh;
        }
      }
    </style>
  </head>

  <body>
    <main class="shell">
      <aside class="panel">
        <div>
          <h1 class="title">iframe 嵌入示例</h1>
          <p class="hint">父页面负责获取文件和上传结果，iframe 只负责编辑文档。</p>
        </div>

        <label class="field">
          选择本地文件
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv,.docx,.doc,.pptx,.ppt" />
        </label>

        <button id="openLocalBtn">打开选择的文件</button>
        <button id="openGeneratedBtn" class="secondary">打开示例 Excel</button>

        <label class="field">
          文件 URL
          <input id="urlInput" type="text" placeholder="https://example.com/demo.xlsx" />
        </label>

        <button id="openUrlBtn" class="secondary">通过 URL 打开</button>

        <label class="row">
          <input id="readonlyInput" type="checkbox" />
          只读模式
        </label>

        <button id="saveBtn">保存并获取 File</button>

        <pre id="log">等待 iframe 初始化...</pre>
      </aside>

      <section class="viewer">
        <div class="bar">
          <span>Document Editor</span>
          <span id="status">loading</span>
        </div>
        <iframe id="editorFrame" src="./?embed=1"></iframe>
      </section>
    </main>

    <script>
      const frame = document.getElementById('editorFrame');
      const statusEl = document.getElementById('status');
      const logEl = document.getElementById('log');
      const fileInput = document.getElementById('fileInput');
      const readonlyInput = document.getElementById('readonlyInput');
      const saveBtn = document.getElementById('saveBtn');

      let requestId = 0;
      const pending = new Map();

      function log(message, data) {
        const time = new Date().toLocaleTimeString();
        const detail = data ? `\n${JSON.stringify(data, null, 2)}` : '';
        logEl.textContent = `[${time}] ${message}${detail}\n\n${logEl.textContent}`;
      }

      async function hashFile(file) {
        const buffer = await file.arrayBuffer();
        const digest = await crypto.subtle.digest('SHA-256', buffer);
        return Array.from(new Uint8Array(digest))
          .map((byte) => byte.toString(16).padStart(2, '0'))
          .join('');
      }

      async function readFirstSheetCell(file, cellAddress) {
        if (!file.name.toLowerCase().endsWith('.xlsx')) return undefined;
        const buffer = await file.arrayBuffer();
        const workbook = XLSX.read(buffer, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        return sheet && sheet[cellAddress] ? sheet[cellAddress].v : undefined;
      }

      function post(type, payload = {}) {
        const id = `demo-${++requestId}`;
        frame.contentWindow.postMessage({ id, type, payload }, window.location.origin);
        return new Promise((resolve, reject) => {
          pending.set(id, { resolve, reject });
          setTimeout(() => {
            if (pending.has(id)) {
              pending.delete(id);
              reject(new Error(`${type} timeout`));
            }
          }, 45000);
        });
      }

      function createDemoExcelFile() {
        const rows = [
          ['日期', '客户', '金额', '状态'],
          ['2026-05-19', '示例客户 A', 1280, '待确认'],
          ['2026-05-20', '示例客户 B', 2360, '已完成'],
        ];
        const worksheet = XLSX.utils.aoa_to_sheet(rows);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, '订单');
        const data = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
        return new File([data], 'iframe-demo.xlsx', {
          type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
        });
      }

      window.addEventListener('message', (event) => {
        if (event.origin !== window.location.origin) return;

        const { id, type, payload } = event.data || {};
        if (!type || !type.startsWith('document:')) return;

        if (type === 'document:ready') {
          statusEl.textContent = 'ready';
          log('iframe 已就绪');
          return;
        }

        if (type === 'document:error') {
          log('iframe 返回错误', payload);
          if (id && pending.has(id)) {
            pending.get(id).reject(new Error(payload.message));
            pending.delete(id);
          }
          return;
        }

        log(`收到 ${type}`, payload);
        if (id && pending.has(id)) {
          pending.get(id).resolve(payload);
          pending.delete(id);
        }
      });

      document.getElementById('openLocalBtn').addEventListener('click', async () => {
        const file = fileInput.files && fileInput.files[0];
        if (!file) {
          log('请先选择一个文件');
          return;
        }
        await post('document:open-file', { file, readonly: readonlyInput.checked });
      });

      document.getElementById('openGeneratedBtn').addEventListener('click', async () => {
        await post('document:open-buffer', {
          fileName: 'iframe-demo.xlsx',
          buffer: await createDemoExcelFile().arrayBuffer(),
          mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
          readonly: readonlyInput.checked,
        });
      });

      document.getElementById('openUrlBtn').addEventListener('click', async () => {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) {
          log('请先输入文件 URL');
          return;
        }
        await post('document:open-url', {
          url,
          readonly: readonlyInput.checked,
        });
      });

      readonlyInput.addEventListener('change', async () => {
        await post('document:set-readonly', { readonly: readonlyInput.checked });
        saveBtn.disabled = readonlyInput.checked;
      });

      saveBtn.addEventListener('click', async () => {
        const result = await post('document:save', { targetExt: 'XLSX' });
        const file = result.file;
        window.lastSavedFile = file;
        log('父页面已拿到 File，可在这里 fetch 上传', {
          fileName: file.name,
          size: file.size,
          type: file.type,
          sha256: await hashFile(file),
          firstSheetB3: await readFirstSheetCell(file, 'B3'),
        });

        // 示例上传写法：
        // await fetch('/api/upload', {
        //   method: 'POST',
        //   headers: { Authorization: `Bearer ${token}` },
        //   body: file,
        // });
      });
    </script>
  </body>
</html>
